name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Show environment
        run: |
          python --version
          pip freeze

      - name: Run tests
        run: pytest -v

      - name: Upload training artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pinn-training-plot-py${{ matrix.python-version }}
          path: outputs/pinn_first_run.png
          if-no-files-found: warn
          retention-days: 30